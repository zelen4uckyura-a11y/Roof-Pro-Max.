name: PRO MAX APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Debug APK
        run: |
          mkdir -p app/src/main/java/com/promax/roofcalc
          # Цей скрипт сам створить мінімальний проект для тесту збірки
          echo 'plugins { id "com.android.application" }' > build.gradle
          ./gradlew assembleDebug || echo "Чекаємо на решту файлів"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PRO-MAX-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
